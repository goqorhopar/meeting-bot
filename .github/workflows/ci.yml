name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Python dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install flake8 black mypy
      
      - name: Install Node.js dependencies
        run: npm ci
      
      - name: Run Flake8
        run: flake8 *.py --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Check Python syntax
        run: python -m py_compile main.py config.py tools.py
      
      - name: Check JavaScript syntax
        run: node --check join-meeting.js

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Python dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Install Node.js dependencies
        run: npm ci
      
      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: meeting-bot:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image
        run: |
          docker run --rm meeting-bot:test curl -f http://localhost:8080/health || echo "Health check skipped (container startup time)"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install safety
        run: pip install safety bandit
      
      - name: Run safety check
        run: safety check -r requirements.txt --ignore 51668,58954
      
      - name: Run bandit scan
        run: bandit -r *.py -f json -o bandit-report.json || true
      
      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
