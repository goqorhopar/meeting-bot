# Docker Compose for Meeting Bot - Production Ready
# Provides: FastAPI app, Redis for rate limiting, optional PostgreSQL

version: '3.8'

services:
  # Main application service
  meeting-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meeting-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BITRIX_WEBHOOK_URL=${BITRIX_WEBHOOK_URL}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - AUDIO_DEVICE=${AUDIO_DEVICE:-pulse}
      - MEETING_TIMEOUT=${MEETING_TIMEOUT:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    volumes:
      - ./recordings:/app/recordings
      - ./transcripts:/app/transcripts
      - ./reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meeting-bot-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: meeting-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meeting-bot-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Optional: PostgreSQL for persistent storage (future use)
  # Uncomment if you need database storage
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: meeting-bot-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: meetingbot
  #     POSTGRES_USER: meetingbot
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U meetingbot"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - meeting-bot-network

  # Optional: Nginx reverse proxy for production
  # Uncomment for production deployment with SSL
  # nginx:
  #   image: nginx:alpine
  #   container_name: meeting-bot-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - meeting-bot
  #   networks:
  #     - meeting-bot-network

volumes:
  redis-data:
  # postgres-data:

networks:
  meeting-bot-network:
    driver: bridge
